openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: qa
    description: QA test case generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate:
    post:
      operationId: generateTestCases
      tags: [qa]
      summary: Generate QA test cases
      description: Accepts a Jira-style ticket and returns structured QA test cases generated by OpenAI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JiraTicket"
      responses:
        "200":
          description: Generated test cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTestCasesResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    JiraTicket:
      type: object
      properties:
        ticket_id:
          type: string
          description: Jira ticket ID (e.g. APP-1024)
        summary:
          type: string
          description: Short summary of the ticket
        description:
          type: string
          description: Full description of the ticket
        acceptance_criteria:
          type: array
          items:
            type: string
          description: List of acceptance criteria
        issue_type:
          type: string
          description: Type of issue (story, bug, task, etc.)
        priority:
          type: string
          description: Priority level (low, medium, high, critical)
        component:
          type: string
          description: Component or module affected
        labels:
          type: array
          items:
            type: string
          description: Labels/tags for the ticket
        environment:
          type: string
          description: Target environment (staging, production, etc.)
      required:
        - ticket_id
        - summary

    TestCase:
      type: object
      properties:
        test_case_id:
          type: string
        test_scenario:
          type: string
        preconditions:
          type: array
          items:
            type: string
        test_steps:
          type: array
          items:
            type: string
        test_data:
          type: array
          items:
            type: string
        expected_result:
          type: string
        priority:
          type: string
          nullable: true
          enum: [low, medium, high, critical]
        automation_candidate:
          type: boolean
        tags:
          type: array
          items:
            type: string
      required:
        - test_case_id
        - test_scenario
        - preconditions
        - test_steps
        - test_data
        - expected_result
        - automation_candidate
        - tags

    GenerateTestCasesResponse:
      type: object
      properties:
        ticket_id:
          type: string
        summary:
          type: string
        generated_test_cases:
          type: array
          minItems: 3
          maxItems: 6
          items:
            $ref: "#/components/schemas/TestCase"
      required:
        - ticket_id
        - summary
        - generated_test_cases

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required:
        - error
